schema_version: 1

id: endpoint_slices
pack: networking
display_name_singular: endpoint_slice
display_name_plural: endpoint_slices

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.networking.paths
  list_function: discovery_v1_collection_path
  detail_function: discovery_v1_resource_path
  resource_kind: endpointslices

list_response_model: rancher_mcp.models.networking.RancherEndpointSliceList
detail_response_model: rancher_mcp.models.networking.RancherEndpointSliceDetail

shared_imports:
  - endpoint_slice_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: endpoint_slice_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: target_service
      summary_field: target_service
    - name: address_type
      summary_field: address_type
  count_field: endpoint_slice_count
  collection_field: endpoint_slices
  next_steps:
    - rancher_endpoint_slice_get
    - rancher_services_list
    - rancher_pods_list

get:
  arg_name: endpoint_slice_name
  summary_copy_fields:
    - port_count
    - endpoint_count
    - ready_endpoint_count
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_endpoint_slices_list
    - rancher_services_list

tools:
  list:
    name: rancher_endpoint_slices_list
    description: List Kubernetes EndpointSlice resources in one namespace via Rancher's raw Kubernetes proxy. Filter by target service or address type.
    annotation_set: READ_ONLY
  get:
    name: rancher_endpoint_slice_get
    description: Fetch one Kubernetes EndpointSlice by namespace and name via Rancher's raw Kubernetes proxy. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
