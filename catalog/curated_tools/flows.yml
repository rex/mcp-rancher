schema_version: 1

id: flows
pack: logging_pipeline
display_name_singular: flow
display_name_plural: flows

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.logging_pipeline.paths
  list_function: logging_namespaced_collection_path
  detail_function: logging_namespaced_resource_path
  resource_kind: flows

list_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingFlowList
detail_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingFlowDetail

shared_imports:
  - flow_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: flow_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

list:
  query_params: [limit, continue_token, label_selector]
  filters: []
  count_field: flow_count
  collection_field: flows
  next_steps:
    - rancher_flow_get
    - rancher_outputs_list

get:
  arg_name: flow_name
  summary_copy_fields:
    - match_count
    - filter_count
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_flows_list
    - rancher_outputs_list

delete:
  audit_operation: flow_delete
  confirmation_phrase: "delete flow {flow_name} in namespace {namespace}"
  next_steps:
    - rancher_flows_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: flow_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_flow_get
      - rancher_outputs_list
  - verb: set_annotations
    target_path: metadata
    audit_operation: flow_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics — passing this REPLACES the annotations map; pass an empty dict to remove all annotations).
    next_steps:
      - rancher_flow_get

tools:
  list:
    name: rancher_flows_list
    description: List Banzai logging Flow resources in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with localOutputRefs, globalOutputRefs, match_count, filter_count.
    annotation_set: READ_ONLY
  get:
    name: rancher_flow_get
    description: Fetch one Banzai logging Flow by namespace and name. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
  delete:
    name: rancher_flow_delete
    description: Delete one Banzai logging Flow. The `confirmation` arg must equal the exact phrase "delete flow NAME in namespace NS" (substituting the actual values). Returns a typed delete result. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_flow_set_labels
      description: Replace metadata.labels on one Banzai logging Flow via JSON merge-patch. The `labels` arg is a complete replacement map.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_flow_set_annotations
      description: Replace metadata.annotations on one Banzai logging Flow via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
