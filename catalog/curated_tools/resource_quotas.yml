schema_version: 1

id: resource_quotas
pack: governance
display_name_singular: resource_quota
display_name_plural: resource_quotas

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.governance.paths
  list_function: core_v1_collection_path
  detail_function: core_v1_resource_path
  resource_kind: resourcequotas

list_response_model: rancher_mcp.models.governance.RancherResourceQuotaList
detail_response_model: rancher_mcp.models.governance.RancherResourceQuotaDetail

shared_imports:
  - items
  - resource_quota_summary_from_payload
support_value_imports:
  - string_dict
summary_function: resource_quota_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters: []
  count_field: resource_quota_count
  collection_field: resource_quotas
  next_steps:
    - rancher_resource_quota_get
    - rancher_pods_list

get:
  arg_name: resource_quota_name
  summary_copy_fields:
    - hard_limit_count
    - used_count
    - hard_limit_keys
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_resource_quotas_list
    - rancher_pods_list

delete:
  audit_operation: resource_quota_delete
  confirmation_phrase: "delete resource_quota {resource_quota_name} in namespace {namespace}"
  next_steps:
    - rancher_resource_quotas_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: resource_quota_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_resource_quota_get
      - rancher_resource_quotas_list
  - verb: set_annotations
    target_path: metadata
    audit_operation: resource_quota_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics).
    next_steps:
      - rancher_resource_quota_get

tools:
  list:
    name: rancher_resource_quotas_list
    description: List Kubernetes ResourceQuotas (core/v1) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with hard_limit_count, used_count, and hard_limit_keys (sorted resource names with limits set).
    annotation_set: READ_ONLY
  get:
    name: rancher_resource_quota_get
    description: Fetch one ResourceQuota by namespace and name. Returns the curated summary plus the full status.hard and status.used dicts (mapping resource names to quantities), annotation keys, and full payload.
    annotation_set: READ_ONLY
  delete:
    name: rancher_resource_quota_delete
    description: Delete one ResourceQuota. The `confirmation` arg must equal the exact phrase "delete resource_quota RESOURCE_QUOTA_NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_resource_quota_set_labels
      description: Replace metadata.labels on one Kubernetes ResourceQuota via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_resource_quota_set_annotations
      description: Replace metadata.annotations on one Kubernetes ResourceQuota via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
