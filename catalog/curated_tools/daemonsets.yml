schema_version: 1

id: daemonsets
pack: workloads
display_name_singular: daemonset
display_name_plural: daemonsets

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.workloads.paths
  list_function: workload_collection_path
  detail_function: workload_resource_path
  resource_kind: daemonsets

list_response_model: rancher_mcp.models.workloads.RancherDaemonSetList
detail_response_model: rancher_mcp.models.workloads.RancherDaemonSetDetail

shared_imports:
  - daemonset_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: daemonset_summary_from_payload

operations: [list, get, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: ready
      summary_field: ready
      type: bool
  count_field: daemonset_count
  collection_field: daemonsets
  next_steps:
    - rancher_daemonset_get
    - rancher_pods_list

get:
  arg_name: daemonset_name
  summary_copy_fields:
    - id
    - ready
    - container_images
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_daemonsets_list
    - rancher_pods_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: daemonset_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_daemonset_get
      - rancher_pods_list
  - verb: set_annotations
    target_path: metadata
    audit_operation: daemonset_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics).
    next_steps:
      - rancher_daemonset_get

tools:
  list:
    name: rancher_daemonsets_list
    description: List daemonsets in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with readiness state.
    annotation_set: READ_ONLY
  get:
    name: rancher_daemonset_get
    description: Fetch one daemonset by namespace and name via Rancher's raw Kubernetes proxy. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
  patches:
    - name: rancher_daemonset_set_labels
      description: Replace metadata.labels on one Kubernetes DaemonSet via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_daemonset_set_annotations
      description: Replace metadata.annotations on one Kubernetes DaemonSet via JSON merge-patch. The `annotations` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
