schema_version: 1

id: nodes
pack: clusters_nodes
display_name_singular: node
display_name_plural: nodes

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: true

list_path: /v3/nodes
detail_path: /v3/nodes/{node_id}

list_response_model: rancher_mcp.models.clusters_nodes.RancherNodeList
detail_response_model: rancher_mcp.models.clusters_nodes.RancherNodeDetail

shared_imports:
  - data_items
  - node_summary_from_payload
summary_function: node_summary_from_payload
query_builder_function: build_node_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [cluster_id, state, role, unschedulable, limit, sort_by, reverse, marker]
  filters: []
  count_field: node_count
  collection_field: nodes
  next_steps:
    - rancher_node_get
    - rancher_cluster_health_check

get:
  arg_name: node_id
  summary_copy_fields:
    - id
    - name
    - ready
    - roles
  locals: []
  extras: []
  include_action_keys: true
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_nodes_list
    - rancher_cluster_health_check

tools:
  list:
    name: rancher_nodes_list
    description: List Rancher nodes via the Norman /v3 API. Filter by cluster id, role (control-plane/etcd/worker), state, or schedulability. Supports cursor pagination via `marker`.
    annotation_set: READ_ONLY
  get:
    name: rancher_node_get
    description: Fetch one Rancher node by id via the Norman /v3 API. Returns the curated summary plus capacity/allocatable, action keys, and full payload.
    annotation_set: READ_ONLY
