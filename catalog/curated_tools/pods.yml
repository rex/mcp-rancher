schema_version: 1

# Identity
id: pods
pack: pods_services
display_name_singular: pod
display_name_plural: pods

# API plane and paths
plane: steve
namespaced: true
list_path: /pods/{namespace}
detail_path: /pods/{namespace}/{pod_name}

# Models
list_response_model: rancher_mcp.models.pods_services.RancherPodList
detail_response_model: rancher_mcp.models.pods_services.RancherPodDetail

# Imports from tools/<pack>/shared.py
shared_imports:
  - data_items
  - pod_events_best_effort
  - pod_summary_from_payload
summary_function: pod_summary_from_payload

# Operations
operations: [list, get, delete, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: phase
      summary_field: phase
  count_field: pod_count
  collection_field: pods
  next_steps:
    - rancher_pod_get
    - rancher_services_list
    - rancher_deployments_list

get:
  arg_name: pod_name
  summary_copy_fields:
    - id
    - ready_condition
    - ready_containers
    - total_containers
    - restart_count
  needs_instance_config: true
  locals: []
  extras:
    - field: events
      expression: await pod_events_best_effort(instance_name, instance_config, cluster_id, namespace, pod_name)
  include_link_keys: true
  include_payload: true
  next_steps:
    - rancher_pods_list
    - rancher_services_list

delete:
  audit_operation: pod_delete
  confirmation_phrase: "delete pod {pod_name} in namespace {namespace}"
  next_steps:
    - rancher_pods_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: pod_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_pod_get
      - rancher_pods_list
  - verb: set_annotations
    target_path: metadata
    audit_operation: pod_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics — passing this REPLACES the annotations map; pass an empty dict to remove all annotations).
    next_steps:
      - rancher_pod_get

tools:
  list:
    name: rancher_pods_list
    description: List pods filtered by phase, namespace, or label selector. Returns a curated summary plus pagination metadata.
    annotation_set: READ_ONLY
  get:
    name: rancher_pod_get
    description: Fetch one pod by namespace and name. Returns the curated summary plus full payload, link keys, and the pod's 10 most recent Kubernetes events (best-effort — omitted if the events fetch fails).
    annotation_set: READ_ONLY
  delete:
    name: rancher_pod_delete
    description: Delete one Kubernetes Pod. The `confirmation` arg must equal the exact phrase "delete pod NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_pod_set_labels
      description: Replace metadata.labels on one Pod via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_pod_set_annotations
      description: Replace metadata.annotations on one Pod via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
