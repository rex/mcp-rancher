schema_version: 1

id: cluster_role_template_bindings
pack: rbac
display_name_singular: cluster_role_template_binding
display_name_plural: cluster_role_template_bindings

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/clusterroletemplatebindings
detail_path: /v3/clusterroletemplatebindings/{cluster_role_template_binding_id}

list_response_model: rancher_mcp.models.rbac.RancherClusterRoleTemplateBindingList
detail_response_model: rancher_mcp.models.rbac.RancherClusterRoleTemplateBindingDetail

shared_imports:
  - binding_subject
  - cluster_role_template_binding_summary_from_payload
  - data_items
  - link_keys
summary_function: cluster_role_template_binding_summary_from_payload
query_builder_function: build_cluster_role_template_binding_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params:
    - limit
    - cluster_id
    - role_template_id
    - user_id
    - user_principal_id
    - group_id
    - group_principal_id
    - namespace_id
    - name
    - sort_by
    - reverse
  filters: []
  count_field: cluster_role_template_binding_count
  collection_field: cluster_role_template_bindings
  next_steps:
    - rancher_cluster_role_template_binding_get
    - rancher_role_templates_list

get:
  arg_name: cluster_role_template_binding_id
  summary_copy_fields: []
  locals:
    - name: subject
      expression: binding_subject(payload)
  extras:
    - field: subject_kind
      expression: subject[0]
    - field: subject_id
      expression: subject[1]
    - field: link_keys
      expression: link_keys(payload)
  include_action_keys: false
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cluster_role_template_bindings_list
    - rancher_role_templates_list

tools:
  list:
    name: rancher_cluster_role_template_bindings_list
    description: List Rancher cluster role-template bindings via the Norman /v3 API. Filter by cluster id, role template id, user/group, or namespace.
    annotation_set: READ_ONLY
  get:
    name: rancher_cluster_role_template_binding_get
    description: Fetch one Rancher cluster role-template binding by id via the Norman /v3 API. Returns the curated summary plus the derived subject (kind + id) and link keys.
    annotation_set: READ_ONLY
