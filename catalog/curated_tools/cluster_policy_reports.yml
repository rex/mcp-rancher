schema_version: 1

id: cluster_policy_reports
pack: policy_reports
display_name_singular: cluster_policy_report
display_name_plural: cluster_policy_reports

plane: steve
transport: k8s-proxy
namespaced: false

path_helper:
  module: rancher_mcp.tools.policy_reports.paths
  list_function: policy_cluster_collection_path
  detail_function: policy_cluster_resource_path
  resource_kind: clusterpolicyreports

list_response_model: rancher_mcp.models.policy_reports.RancherClusterPolicyReportList
detail_response_model: rancher_mcp.models.policy_reports.RancherClusterPolicyReportDetail

shared_imports:
  - cluster_policy_report_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: cluster_policy_report_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, continue_token, label_selector]
  filters: []
  count_field: cluster_policy_report_count
  collection_field: cluster_policy_reports
  next_steps:
    - rancher_cluster_policy_report_get
    - rancher_policy_reports_list

get:
  arg_name: report_name
  summary_copy_fields:
    - result_count
    - top_failing_policies
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cluster_policy_reports_list
    - rancher_policy_reports_list

tools:
  list:
    name: rancher_cluster_policy_reports_list
    description: List ClusterPolicyReport resources (wgpolicyk8s.io/v1alpha2, cluster-scoped) via Rancher's raw Kubernetes proxy.
    annotation_set: READ_ONLY
  get:
    name: rancher_cluster_policy_report_get
    description: Fetch one ClusterPolicyReport by name. Returns the curated summary plus full payload (with all results).
    annotation_set: READ_ONLY
