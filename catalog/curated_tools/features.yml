schema_version: 1

id: features
pack: settings_features
display_name_singular: feature
display_name_plural: features

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/features
detail_path: /v3/features/{feature_id}

list_response_model: rancher_mcp.models.settings_features.RancherFeatureList
detail_response_model: rancher_mcp.models.settings_features.RancherFeatureDetail

shared_imports:
  - data_items
  - feature_summary_from_payload
summary_function: feature_summary_from_payload
query_builder_function: build_feature_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, state, enabled]
  filters: []
  count_field: feature_count
  collection_field: features
  next_steps:
    - rancher_feature_get
    - rancher_settings_list

get:
  arg_name: feature_id
  summary_copy_fields: []
  locals: []
  extras: []
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_features_list
    - rancher_settings_list

tools:
  list:
    name: rancher_features_list
    description: List Rancher feature flags via the Norman /v3 API. Filter by state or enabled value.
    annotation_set: READ_ONLY
  get:
    name: rancher_feature_get
    description: Fetch one Rancher feature flag by id via the Norman /v3 API. Returns the curated summary plus full payload.
    annotation_set: READ_ONLY
