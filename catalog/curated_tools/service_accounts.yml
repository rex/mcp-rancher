schema_version: 1

id: service_accounts
pack: config_secrets
display_name_singular: service_account
display_name_plural: service_accounts

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.config_secrets.paths
  list_function: core_v1_collection_path
  detail_function: core_v1_resource_path
  resource_kind: serviceaccounts

list_response_model: rancher_mcp.models.config_secrets.RancherServiceAccountList
detail_response_model: rancher_mcp.models.config_secrets.RancherServiceAccountDetail

shared_imports:
  - image_pull_secret_names_from_payload
  - items
  - secret_names_from_payload
  - service_account_summary_from_payload
support_value_imports:
  - string_dict
summary_function: service_account_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters: []
  count_field: service_account_count
  collection_field: service_accounts
  next_steps:
    - rancher_service_account_get
    - rancher_pods_list

get:
  arg_name: service_account_name
  summary_copy_fields:
    - secret_count
    - image_pull_secret_count
    - automount_token
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
    - field: secret_names
      expression: secret_names_from_payload(payload)
    - field: image_pull_secret_names
      expression: image_pull_secret_names_from_payload(payload)
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_service_accounts_list
    - rancher_pods_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: service_account_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_service_account_get
      - rancher_pods_list

tools:
  list:
    name: rancher_service_accounts_list
    description: List Kubernetes ServiceAccounts in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with secret and imagePullSecret counts.
    annotation_set: READ_ONLY
  get:
    name: rancher_service_account_get
    description: Fetch one Kubernetes ServiceAccount by namespace and name via Rancher's raw Kubernetes proxy. Returns the curated summary plus secret names, image pull secret names, annotation keys, and full payload.
    annotation_set: READ_ONLY
  patches:
    - name: rancher_service_account_set_labels
      description: Replace metadata.labels on one Kubernetes ServiceAccount via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
