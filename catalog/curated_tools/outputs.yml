schema_version: 1

id: outputs
pack: logging_pipeline
display_name_singular: output
display_name_plural: outputs

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.logging_pipeline.paths
  list_function: logging_namespaced_collection_path
  detail_function: logging_namespaced_resource_path
  resource_kind: outputs

list_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingOutputList
detail_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingOutputDetail

shared_imports:
  - items
  - output_summary_from_payload
support_value_imports:
  - string_dict
summary_function: output_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, continue_token, label_selector]
  filters:
    - name: output_type
      summary_field: output_type
  count_field: output_count
  collection_field: outputs
  next_steps:
    - rancher_output_get
    - rancher_flows_list

get:
  arg_name: output_name
  summary_copy_fields:
    - output_type
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_outputs_list
    - rancher_flows_list

tools:
  list:
    name: rancher_outputs_list
    description: List Banzai logging Output resources in one namespace via Rancher's raw Kubernetes proxy. output_type is auto-detected from the first non-loggingRef key in spec (e.g. s3, loki, kafka).
    annotation_set: READ_ONLY
  get:
    name: rancher_output_get
    description: Fetch one Banzai logging Output by namespace and name. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
