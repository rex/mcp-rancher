schema_version: 1

id: priority_classes
pack: scheduling
display_name_singular: priority_class
display_name_plural: priority_classes

plane: steve
transport: k8s-proxy
namespaced: false

path_helper:
  module: rancher_mcp.tools.scheduling.paths
  list_function: scheduling_v1_collection_path
  detail_function: scheduling_v1_resource_path
  resource_kind: priorityclasses

list_response_model: rancher_mcp.models.scheduling.RancherPriorityClassList
detail_response_model: rancher_mcp.models.scheduling.RancherPriorityClassDetail

shared_imports:
  - items
  - priority_class_summary_from_payload
support_value_imports:
  - string_dict
summary_function: priority_class_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, patch]

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: priority_class_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_priority_class_get

list:
  query_params: [limit, continue_token, label_selector]
  filters:
    - name: global_default
      summary_field: global_default
      type: bool
    - name: preemption_policy
      summary_field: preemption_policy
  count_field: priority_class_count
  collection_field: priority_classes
  next_steps:
    - rancher_priority_class_get
    - rancher_pods_list

get:
  arg_name: priority_class_name
  summary_copy_fields:
    - value
    - description
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_priority_classes_list
    - rancher_pods_list

tools:
  list:
    name: rancher_priority_classes_list
    description: List Kubernetes PriorityClasses (scheduling.k8s.io/v1, cluster-scoped) via Rancher's raw Kubernetes proxy. Returns curated summaries with value (priority integer), globalDefault flag, preemptionPolicy, and description. Filter by global_default (bool) or preemption_policy.
    annotation_set: READ_ONLY
  get:
    name: rancher_priority_class_get
    description: Fetch one PriorityClass by name. Returns the curated summary plus annotation keys and full payload.
    annotation_set: READ_ONLY
  patches:
    - name: rancher_priority_class_set_labels
      description: Replace metadata.labels on one Kubernetes PriorityClass (cluster-scoped) via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
