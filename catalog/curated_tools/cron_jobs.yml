schema_version: 1

id: cron_jobs
pack: batch_workloads
display_name_singular: cron_job
display_name_plural: cron_jobs

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.batch_workloads.paths
  list_function: batch_v1_collection_path
  detail_function: batch_v1_resource_path
  resource_kind: cronjobs

list_response_model: rancher_mcp.models.batch_workloads.RancherCronJobList
detail_response_model: rancher_mcp.models.batch_workloads.RancherCronJobDetail

shared_imports:
  - active_job_names
  - cron_job_container_images
  - cron_job_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: cron_job_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: suspend
      summary_field: suspend
      type: bool
  count_field: cron_job_count
  collection_field: cron_jobs
  next_steps:
    - rancher_cron_job_get
    - rancher_jobs_list

get:
  arg_name: cron_job_name
  summary_copy_fields:
    - active_job_count
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
    - field: container_images
      expression: cron_job_container_images(payload)
    - field: active_job_names
      expression: active_job_names(payload)
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cron_jobs_list
    - rancher_jobs_list

tools:
  list:
    name: rancher_cron_jobs_list
    description: List Kubernetes CronJobs (batch/v1) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with schedule, suspend flag, concurrencyPolicy, history limits, lastScheduleTime, lastSuccessfulTime, and active_job_count derived from status.active[]. Filter by suspend (bool).
    annotation_set: READ_ONLY
  get:
    name: rancher_cron_job_get
    description: Fetch one Kubernetes CronJob by namespace and name. Returns the curated summary plus container_images list (from spec.jobTemplate.spec.template.spec.containers), active_job_names list, annotation keys, and full payload.
    annotation_set: READ_ONLY
