schema_version: 1

id: cron_jobs
pack: batch_workloads
display_name_singular: cron_job
display_name_plural: cron_jobs

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.batch_workloads.paths
  list_function: batch_v1_collection_path
  detail_function: batch_v1_resource_path
  resource_kind: cronjobs

list_response_model: rancher_mcp.models.batch_workloads.RancherCronJobList
detail_response_model: rancher_mcp.models.batch_workloads.RancherCronJobDetail

shared_imports:
  - active_job_names
  - cron_job_container_images
  - cron_job_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: cron_job_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: suspend
      summary_field: suspend
      type: bool
  count_field: cron_job_count
  collection_field: cron_jobs
  next_steps:
    - rancher_cron_job_get
    - rancher_jobs_list

get:
  arg_name: cron_job_name
  summary_copy_fields:
    - active_job_count
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
    - field: container_images
      expression: cron_job_container_images(payload)
    - field: active_job_names
      expression: active_job_names(payload)
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cron_jobs_list
    - rancher_jobs_list

delete:
  audit_operation: cron_job_delete
  confirmation_phrase: "delete cron_job {cron_job_name} in namespace {namespace}"
  next_steps:
    - rancher_cron_jobs_list

patches:
  - verb: suspend
    target_path: spec
    audit_operation: cronjob_suspend
    args:
      - name: suspend
        type: bool
        required: true
        description: Pause (true) or resume (false) the CronJob.
    next_steps:
      - rancher_cron_job_get
      - rancher_jobs_list
  - verb: set_labels
    target_path: metadata
    audit_operation: cron_job_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_cron_job_get
  - verb: set_annotations
    target_path: metadata
    audit_operation: cron_job_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics — passing this REPLACES the annotations map; pass an empty dict to remove all annotations).
    next_steps:
      - rancher_cron_job_get

tools:
  list:
    name: rancher_cron_jobs_list
    description: List Kubernetes CronJobs (batch/v1) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with schedule, suspend flag, concurrencyPolicy, history limits, lastScheduleTime, lastSuccessfulTime, and active_job_count derived from status.active[]. Filter by suspend (bool).
    annotation_set: READ_ONLY
  get:
    name: rancher_cron_job_get
    description: Fetch one Kubernetes CronJob by namespace and name. Returns the curated summary plus container_images list (from spec.jobTemplate.spec.template.spec.containers), active_job_names list, annotation keys, and full payload.
    annotation_set: READ_ONLY
  delete:
    name: rancher_cron_job_delete
    description: Delete one Kubernetes CronJob. The `confirmation` arg must equal the exact phrase "delete cron_job NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_cron_job_suspend
      description: Pause or resume one Kubernetes CronJob via JSON merge-patch on `spec.suspend`. Pass suspend=True to pause, suspend=False to resume. Returns the curated detail. Subject to write rate limiting and audit logging.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_cron_job_set_labels
      description: Replace metadata.labels on one Kubernetes CronJob via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_cron_job_set_annotations
      description: Replace metadata.annotations on one Kubernetes CronJob via JSON merge-patch. The `annotations` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
