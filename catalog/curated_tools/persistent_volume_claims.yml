schema_version: 1

id: persistent_volume_claims
pack: storage
display_name_singular: persistent_volume_claim
display_name_plural: persistent_volume_claims

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.storage.paths
  list_function: persistent_volume_claim_collection_path
  detail_function: persistent_volume_claim_resource_path

list_response_model: rancher_mcp.models.storage.RancherPersistentVolumeClaimList
detail_response_model: rancher_mcp.models.storage.RancherPersistentVolumeClaimDetail

shared_imports:
  - items
  - persistent_volume_claim_summary_from_payload
support_value_imports:
  - string_dict
summary_function: persistent_volume_claim_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

delete:
  audit_operation: persistent_volume_claim_delete
  confirmation_phrase: "delete persistent_volume_claim {claim_name} in namespace {namespace}"
  next_steps:
    - rancher_persistent_volume_claims_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: persistent_volume_claim_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_persistent_volume_claim_get
  - verb: set_annotations
    target_path: metadata
    audit_operation: persistent_volume_claim_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics).
    next_steps:
      - rancher_persistent_volume_claim_get
  - verb: set_size
    target_path: spec.resources.requests
    audit_operation: persistent_volume_claim_set_size
    args:
      - name: storage
        type: str
        required: true
        description: Kubernetes resource quantity (e.g. "10Gi", "500Mi"). Most StorageClasses validate only-grow.
    next_steps:
      - rancher_persistent_volume_claim_get

list:
  query_params: [limit, continue_token]
  filters:
    - name: phase
      summary_field: phase
    - name: storage_class_name
      summary_field: storage_class_name
  count_field: claim_count
  collection_field: persistent_volume_claims
  next_steps:
    - rancher_persistent_volume_claim_get
    - rancher_persistent_volumes_list
    - rancher_pods_list

get:
  arg_name: claim_name
  summary_copy_fields:
    - id
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
  extras:
    - field: annotation_keys
      expression: 'sorted(string_dict(mapping_value(metadata, "annotations") or {}))'
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_persistent_volume_claims_list
    - rancher_persistent_volumes_list
    - rancher_pods_list

tools:
  list:
    name: rancher_persistent_volume_claims_list
    description: List persistent volume claims in one namespace via Rancher's raw Kubernetes proxy. Filter by phase or storage class.
    annotation_set: READ_ONLY
  get:
    name: rancher_persistent_volume_claim_get
    description: Fetch one persistent volume claim by namespace and name via Rancher's raw Kubernetes proxy. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
  delete:
    name: rancher_persistent_volume_claim_delete
    description: >-
      Delete one Kubernetes PersistentVolumeClaim. The `confirmation` arg must equal the exact
      phrase "delete persistent_volume_claim NAME in namespace NS" (substituting the actual values).
      Storage may be retained or deleted depending on the reclaim policy. Returns a typed delete
      result. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_persistent_volume_claim_set_labels
      description: Replace metadata.labels on one PersistentVolumeClaim via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_persistent_volume_claim_set_annotations
      description: Replace metadata.annotations on one Kubernetes PersistentVolumeClaim via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_persistent_volume_claim_set_size
      description: "Resize a PersistentVolumeClaim via JSON merge-patch. Body is `{spec: {resources: {requests: {storage: <value>}}}}`. Most StorageClasses validate only-grow. Returns curated detail."
      annotation_set: IDEMPOTENT_WRITE
