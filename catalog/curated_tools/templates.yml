schema_version: 1

id: templates
pack: apps_catalogs
display_name_singular: template
display_name_plural: templates

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/templates
detail_path: /v3/templates/{template_id}

list_response_model: rancher_mcp.models.apps_catalogs.RancherTemplateList
detail_response_model: rancher_mcp.models.apps_catalogs.RancherTemplateDetail

shared_imports:
  - data_items
  - template_summary_from_payload
summary_function: template_summary_from_payload
query_builder_function: build_template_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, catalog_id, category, cluster_id, project_id, state, sort_by, reverse]
  filters: []
  count_field: template_count
  collection_field: templates
  next_steps:
    - rancher_template_get
    - rancher_template_versions_list

get:
  arg_name: template_id
  summary_copy_fields: []
  locals:
    - name: version_links
      expression: 'mapping_value(payload, "versionLinks") or {}'
  extras:
    - field: version_link_count
      expression: len(version_links)
  include_action_keys: false
  include_link_keys: true
  include_payload: true
  next_steps:
    - rancher_templates_list
    - rancher_template_versions_list

tools:
  list:
    name: rancher_templates_list
    description: List Rancher templates via the Norman /v3 API. Filter by catalog id, category, cluster id, project id, or state.
    annotation_set: READ_ONLY
  get:
    name: rancher_template_get
    description: Fetch one Rancher template by id via the Norman /v3 API. Returns the curated summary plus version link count, link keys, and full payload.
    annotation_set: READ_ONLY
