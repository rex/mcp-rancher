schema_version: 1

id: horizontal_pod_autoscalers
pack: governance
display_name_singular: horizontal_pod_autoscaler
display_name_plural: horizontal_pod_autoscalers

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.governance.paths
  list_function: autoscaling_v2_collection_path
  detail_function: autoscaling_v2_resource_path
  resource_kind: horizontalpodautoscalers

list_response_model: rancher_mcp.models.governance.RancherHorizontalPodAutoscalerList
detail_response_model: rancher_mcp.models.governance.RancherHorizontalPodAutoscalerDetail

shared_imports:
  - hpa_metric_types
  - hpa_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: hpa_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: target_kind
      summary_field: target_kind
    - name: target_name
      summary_field: target_name
  count_field: horizontal_pod_autoscaler_count
  collection_field: horizontal_pod_autoscalers
  next_steps:
    - rancher_horizontal_pod_autoscaler_get
    - rancher_deployments_list

get:
  arg_name: hpa_name
  summary_copy_fields:
    - metric_count
    - able_to_scale
    - scaling_active
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
    - field: metric_types
      expression: hpa_metric_types(payload)
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_horizontal_pod_autoscalers_list
    - rancher_deployments_list

delete:
  audit_operation: hpa_delete
  confirmation_phrase: "delete horizontal_pod_autoscaler {hpa_name} in namespace {namespace}"
  next_steps:
    - rancher_horizontal_pod_autoscalers_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: hpa_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_horizontal_pod_autoscaler_get
      - rancher_deployments_list
  - verb: set_annotations
    target_path: metadata
    audit_operation: hpa_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics).
    next_steps:
      - rancher_horizontal_pod_autoscaler_get
  - verb: set_min_max
    target_path: spec
    audit_operation: hpa_set_min_max
    args:
      - name: minReplicas
        type: int
        required: true
        description: New value for spec.minReplicas.
      - name: maxReplicas
        type: int
        required: true
        description: New value for spec.maxReplicas.
    next_steps:
      - rancher_horizontal_pod_autoscaler_get

tools:
  list:
    name: rancher_horizontal_pod_autoscalers_list
    description: List HorizontalPodAutoscalers (autoscaling/v2) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with target ref (kind+name), min/max replicas, current/desired replicas, metric_count, and derived able_to_scale + scaling_active booleans from status.conditions. Filter by target_kind or target_name.
    annotation_set: READ_ONLY
  get:
    name: rancher_horizontal_pod_autoscaler_get
    description: Fetch one HorizontalPodAutoscaler by namespace and name. Returns the curated summary plus metric_types (sorted unique types from spec.metrics[].type), annotation keys, and full payload.
    annotation_set: READ_ONLY
  delete:
    name: rancher_horizontal_pod_autoscaler_delete
    description: Delete one HorizontalPodAutoscaler. The `confirmation` arg must equal the exact phrase "delete horizontal_pod_autoscaler HPA_NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_horizontal_pod_autoscaler_set_labels
      description: Replace metadata.labels on one HorizontalPodAutoscaler via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_horizontal_pod_autoscaler_set_annotations
      description: Replace metadata.annotations on one Kubernetes HorizontalPodAutoscaler via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_horizontal_pod_autoscaler_set_min_max
      description: "Set spec.minReplicas and spec.maxReplicas on a HorizontalPodAutoscaler via JSON merge-patch. Body is `{spec: {minReplicas: N, maxReplicas: M}}`. Returns curated detail."
      annotation_set: IDEMPOTENT_WRITE
