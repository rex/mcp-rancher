schema_version: 1

id: configmaps
pack: config_secrets
display_name_singular: config_map
display_name_plural: config_maps

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.config_secrets.paths
  list_function: core_v1_collection_path
  detail_function: core_v1_resource_path
  resource_kind: configmaps

list_response_model: rancher_mcp.models.config_secrets.RancherConfigMapList
detail_response_model: rancher_mcp.models.config_secrets.RancherConfigMapDetail

shared_imports:
  - build_configmap_payload
  - config_map_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: config_map_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, create, apply, delete]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters: []
  count_field: config_map_count
  collection_field: config_maps
  next_steps:
    - rancher_config_map_get
    - rancher_pods_list

get:
  arg_name: config_map_name
  summary_copy_fields:
    - data_key_count
    - binary_data_key_count
    - immutable
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
    - name: data_dict
      expression: 'mapping_value(payload, "data") or {}'
    - name: binary_data_dict
      expression: 'mapping_value(payload, "binaryData") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
    - field: data_keys
      expression: sorted(string_dict(data_dict))
    - field: binary_data_keys
      expression: sorted(string_dict(binary_data_dict))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_config_maps_list
    - rancher_pods_list

create:
  payload_composer: build_configmap_payload
  audit_operation: configmap_create
  args:
    - name: data
      type: dict_str_str
      required: true
      description: Top-level string key/value pairs stored in the ConfigMap.
    - name: binary_data
      type: dict_str_str
      description: Optional binaryData entries (base64-encoded values).
    - name: immutable
      type: bool
      description: If True, the ConfigMap cannot be updated after creation.
    - name: labels
      type: dict_str_str
      description: Optional metadata labels merged into metadata.labels.
    - name: annotations
      type: dict_str_str
      description: Optional metadata annotations merged into metadata.annotations.
  next_steps:
    - rancher_config_map_get
    - rancher_pods_list

apply:
  payload_composer: build_configmap_payload
  audit_operation: configmap_apply
  args:
    - name: data
      type: dict_str_str
      required: true
      description: Top-level string key/value pairs stored in the ConfigMap.
    - name: binary_data
      type: dict_str_str
      description: Optional binaryData entries (base64-encoded values).
    - name: immutable
      type: bool
      description: If True, the ConfigMap cannot be updated after creation.
    - name: labels
      type: dict_str_str
      description: Optional metadata labels merged into metadata.labels.
    - name: annotations
      type: dict_str_str
      description: Optional metadata annotations merged into metadata.annotations.
  next_steps:
    - rancher_config_map_get
    - rancher_pods_list

delete:
  audit_operation: configmap_delete
  confirmation_phrase: "delete configmap {config_map_name} in namespace {namespace}"
  next_steps:
    - rancher_config_maps_list

tools:
  list:
    name: rancher_config_maps_list
    description: List Kubernetes ConfigMaps in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with data key counts.
    annotation_set: READ_ONLY
  get:
    name: rancher_config_map_get
    description: Fetch one Kubernetes ConfigMap by namespace and name via Rancher's raw Kubernetes proxy. Returns the curated summary plus full payload, data keys, binary data keys, and annotation keys.
    annotation_set: READ_ONLY
  create:
    name: rancher_config_map_create
    description: Create one Kubernetes ConfigMap in the given namespace via Rancher's raw Kubernetes proxy. Accepts typed `data` (str → str map) plus optional `binary_data`, `immutable`, `labels`, and `annotations`. Returns the curated detail of the created resource. Subject to write rate limiting and audit logging.
    annotation_set: SAFE_WRITE
  apply:
    name: rancher_config_map_apply
    description: Apply (PUT) one Kubernetes ConfigMap to a desired state via Rancher's raw Kubernetes proxy. Replaces the entire resource — any fields not declared in this call are dropped. Same args as create. Returns the curated detail. Subject to write rate limiting and audit logging.
    annotation_set: IDEMPOTENT_WRITE
  delete:
    name: rancher_config_map_delete
    description: Delete one Kubernetes ConfigMap. The `confirmation` arg must equal the exact phrase "delete configmap NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
