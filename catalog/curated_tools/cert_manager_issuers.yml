schema_version: 1

id: cert_manager_issuers
pack: cert_manager
display_name_singular: cert_manager_issuer
display_name_plural: cert_manager_issuers

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.cert_manager.paths
  list_function: cert_manager_namespaced_collection_path
  detail_function: cert_manager_namespaced_resource_path
  resource_kind: issuers

list_response_model: rancher_mcp.models.cert_manager.RancherCertManagerIssuerList
detail_response_model: rancher_mcp.models.cert_manager.RancherCertManagerIssuerDetail

shared_imports:
  - condition_types_true_from_payload
  - issuer_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: issuer_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

list:
  query_params: [limit, continue_token, label_selector]
  filters:
    - name: ready
      summary_field: ready
      type: bool
    - name: issuer_kind_used
      summary_field: issuer_kind_used
  count_field: cert_manager_issuer_count
  collection_field: cert_manager_issuers
  next_steps:
    - rancher_cert_manager_issuer_get
    - rancher_cert_manager_certificates_list

get:
  arg_name: issuer_name
  summary_copy_fields:
    - ready
    - issuer_kind_used
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
    - field: condition_types_true
      expression: condition_types_true_from_payload(payload)
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cert_manager_issuers_list
    - rancher_cert_manager_certificates_list

delete:
  audit_operation: cert_manager_issuer_delete
  confirmation_phrase: "delete cert_manager_issuer {issuer_name} in namespace {namespace}"
  next_steps:
    - rancher_cert_manager_issuers_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: cert_manager_issuer_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_cert_manager_issuer_get
      - rancher_cert_manager_issuers_list
  - verb: set_annotations
    target_path: metadata
    audit_operation: cert_manager_issuer_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics).
    next_steps:
      - rancher_cert_manager_issuer_get

tools:
  list:
    name: rancher_cert_manager_issuers_list
    description: List cert-manager Issuer CRDs (cert-manager.io/v1, namespaced) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with detected issuer kind (acme / ca / vault / selfSigned / venafi), ACME server and email when configured, and a derived ready boolean.
    annotation_set: READ_ONLY
  get:
    name: rancher_cert_manager_issuer_get
    description: Fetch one cert-manager Issuer by namespace and name. Returns the curated summary plus condition_types_true, annotation keys, and full payload.
    annotation_set: READ_ONLY
  delete:
    name: rancher_cert_manager_issuer_delete
    description: Delete one cert-manager Issuer. The `confirmation` arg must equal the exact phrase "delete cert_manager_issuer NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_cert_manager_issuer_set_labels
      description: Replace metadata.labels on one cert-manager Issuer via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_cert_manager_issuer_set_annotations
      description: Replace metadata.annotations on one cert-manager Issuer via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
