schema_version: 1

id: cloud_credentials
pack: provisioning
display_name_singular: cloud_credential
display_name_plural: cloud_credentials

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/cloudcredentials
detail_path: /v3/cloudcredentials/{credential_id}

list_response_model: rancher_mcp.models.provisioning.RancherCloudCredentialList
detail_response_model: rancher_mcp.models.provisioning.RancherCloudCredentialDetail

shared_imports:
  - cloud_credential_summary_from_payload
  - credential_config_field_keys
  - data_items
support_value_imports:
  - string_dict
summary_function: cloud_credential_summary_from_payload
query_builder_function: build_cloud_credential_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, name, sort_by, reverse]
  filters:
    - name: driver
      summary_field: driver
  count_field: cloud_credential_count
  collection_field: cloud_credentials
  next_steps:
    - rancher_cloud_credential_get
    - rancher_node_templates_list

get:
  arg_name: credential_id
  summary_copy_fields:
    - driver
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
    - field: config_field_keys
      expression: credential_config_field_keys(payload)
  include_action_keys: true
  include_link_keys: true
  include_payload: false
  next_steps:
    - rancher_cloud_credentials_list
    - rancher_norman_resource_get

tools:
  list:
    name: rancher_cloud_credentials_list
    description: List Rancher cloud credentials via the Norman /v3 API. Returns curated summaries — credentialConfig values are masked. Filter by driver (post-fetch).
    annotation_set: READ_ONLY
  get:
    name: rancher_cloud_credential_get
    description: Fetch one Rancher cloud credential by id via the Norman /v3 API. credentialConfig values are masked — only field names appear via config_field_keys. Use rancher_norman_resource_get with schema_id='cloudCredential' for the full unmasked payload.
    annotation_set: READ_ONLY
