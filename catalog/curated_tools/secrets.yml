schema_version: 1

id: secrets
pack: config_secrets
display_name_singular: secret
display_name_plural: secrets

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.config_secrets.paths
  list_function: core_v1_collection_path
  detail_function: core_v1_resource_path
  resource_kind: secrets

list_response_model: rancher_mcp.models.config_secrets.RancherSecretList
detail_response_model: rancher_mcp.models.config_secrets.RancherSecretDetail

shared_imports:
  - build_secret_payload
  - items
  - secret_summary_from_payload
support_value_imports:
  - string_dict
summary_function: secret_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, create]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: secret_type
      summary_field: secret_type
  count_field: secret_count
  collection_field: secrets
  next_steps:
    - rancher_secret_get
    - rancher_steve_resource_get

get:
  arg_name: secret_name
  summary_copy_fields:
    - data_key_count
    - immutable
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
    - name: data_dict
      expression: 'mapping_value(payload, "data") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
    - field: data_keys
      expression: sorted(string_dict(data_dict))
  include_link_keys: false
  include_payload: false
  next_steps:
    - rancher_secrets_list
    - rancher_steve_resource_get

create:
  payload_composer: build_secret_payload
  audit_operation: secret_create
  args:
    - name: string_data
      type: dict_str_str
      description: Plaintext key/value pairs — Kubernetes server-side base64-encodes these before storage. Pass either string_data OR data (already-base64 values); at least one is required.
    - name: data
      type: dict_str_str
      description: Already-base64-encoded key/value pairs (matches the on-disk Secret shape). Pass either data OR string_data; at least one is required.
    - name: secret_type
      type: str
      description: Optional Kubernetes Secret type (Opaque, kubernetes.io/dockerconfigjson, kubernetes.io/tls, etc.). Defaults to Opaque server-side.
    - name: immutable
      type: bool
      description: If True, the Secret cannot be updated after creation.
    - name: labels
      type: dict_str_str
      description: Optional metadata labels merged into metadata.labels.
    - name: annotations
      type: dict_str_str
      description: Optional metadata annotations merged into metadata.annotations.
  next_steps:
    - rancher_secret_get
    - rancher_steve_resource_get

tools:
  list:
    name: rancher_secrets_list
    description: List Kubernetes Secrets in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries — data values are masked. Filter by secret type.
    annotation_set: READ_ONLY
  get:
    name: rancher_secret_get
    description: Fetch one Kubernetes Secret by namespace and name via Rancher's raw Kubernetes proxy. Data values are masked — only key names appear. Use rancher_steve_resource_get with schema_id='secret' for the full unmasked payload.
    annotation_set: READ_ONLY
  create:
    name: rancher_secret_create
    description: Create one Kubernetes Secret in the given namespace via Rancher's raw Kubernetes proxy. Pass plaintext values via `string_data` (server base64-encodes them) or pre-encoded values via `data` — at least one is required. Optional `secret_type` (defaults to Opaque), `immutable`, `labels`, `annotations`. Returns the curated detail with data values masked. Subject to write rate limiting and audit logging.
    annotation_set: SAFE_WRITE
