schema_version: 1

id: secrets
pack: config_secrets
display_name_singular: secret
display_name_plural: secrets

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.config_secrets.paths
  list_function: core_v1_collection_path
  detail_function: core_v1_resource_path
  resource_kind: secrets

list_response_model: rancher_mcp.models.config_secrets.RancherSecretList
detail_response_model: rancher_mcp.models.config_secrets.RancherSecretDetail

shared_imports:
  - build_secret_payload
  - items
  - secret_summary_from_payload
support_value_imports:
  - string_dict
summary_function: secret_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, create, delete, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: secret_type
      summary_field: secret_type
  count_field: secret_count
  collection_field: secrets
  next_steps:
    - rancher_secret_get
    - rancher_steve_resource_get

get:
  arg_name: secret_name
  reveal_param: true
  summary_copy_fields:
    - data_key_count
    - immutable
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
    - name: data_dict
      expression: 'mapping_value(payload, "data") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
    - field: data_keys
      expression: sorted(string_dict(data_dict))
  # M-SEC-2: `data` (the decoded values) is suppressed to `{}` by default —
  # only revealed_expression fires, and only inside get, when reveal=True.
  # create has no `reveal` input, so it always renders hidden_expression
  # (never emits values). See RevealGatedExtra / GetConfig.reveal_param.
  reveal_gated_extras:
    - field: data
      revealed_expression: detail.data
      hidden_expression: "{}"
  include_link_keys: false
  include_payload: false
  next_steps:
    - rancher_secrets_list
    - rancher_steve_resource_get

create:
  payload_composer: build_secret_payload
  audit_operation: secret_create
  args:
    - name: string_data
      type: dict_str_str
      description: Plaintext key/value pairs — Kubernetes server-side base64-encodes these before storage. Pass either string_data OR data (already-base64 values); at least one is required.
    - name: data
      type: dict_str_str
      description: Already-base64-encoded key/value pairs (matches the on-disk Secret shape). Pass either data OR string_data; at least one is required.
    - name: secret_type
      type: str
      description: Optional Kubernetes Secret type (Opaque, kubernetes.io/dockerconfigjson, kubernetes.io/tls, etc.). Defaults to Opaque server-side.
    - name: immutable
      type: bool
      description: If True, the Secret cannot be updated after creation.
    - name: labels
      type: dict_str_str
      description: Optional metadata labels merged into metadata.labels.
    - name: annotations
      type: dict_str_str
      description: Optional metadata annotations merged into metadata.annotations.
  next_steps:
    - rancher_secret_get
    - rancher_steve_resource_get

delete:
  audit_operation: secret_delete
  confirmation_phrase: "delete secret {secret_name} in namespace {namespace}"
  next_steps:
    - rancher_secrets_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: secret_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_secret_get
      - rancher_steve_resource_get
  - verb: set_annotations
    target_path: metadata
    audit_operation: secret_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics — passing this REPLACES the annotations map; pass an empty dict to remove all annotations).
    next_steps:
      - rancher_secret_get
      - rancher_steve_resource_get

tools:
  list:
    name: rancher_secrets_list
    description: List Kubernetes Secrets in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries — data values are masked. Filter by secret type.
    annotation_set: READ_ONLY
  get:
    name: rancher_secret_get
    description: Fetch one Kubernetes Secret by namespace and name via Rancher's raw Kubernetes proxy. By default only key names/counts are returned (data values withheld) — pass reveal=true to receive the decoded values, which emits an audited reveal record. Use rancher_steve_resource_get with schema_id='secret' for the full unmasked payload.
    annotation_set: READ_ONLY
  create:
    name: rancher_secret_create
    description: Create one Kubernetes Secret in the given namespace via Rancher's raw Kubernetes proxy. Pass plaintext values via `string_data` (server base64-encodes them) or pre-encoded values via `data` — at least one is required. Optional `secret_type` (defaults to Opaque), `immutable`, `labels`, `annotations`. Returns the curated detail with data values masked. Subject to write rate limiting and audit logging.
    annotation_set: SAFE_WRITE
  delete:
    name: rancher_secret_delete
    description: Delete one Kubernetes Secret. The `confirmation` arg must equal the exact phrase "delete secret NAME in namespace NS" (substituting the actual values). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_secret_set_labels
      description: Replace metadata.labels on one Kubernetes Secret via JSON merge-patch. The `labels` arg is a complete replacement map. Returns the curated detail with data values masked.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_secret_set_annotations
      description: Replace metadata.annotations on one Kubernetes Secret via JSON merge-patch. The `annotations` arg is a complete replacement map. Returns the curated detail with data values masked.
      annotation_set: IDEMPOTENT_WRITE
