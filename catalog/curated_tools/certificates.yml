schema_version: 1

id: certificates
pack: certificates
display_name_singular: certificate
display_name_plural: certificates

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/certificates
detail_path: /v3/certificates/{certificate_id}

list_response_model: rancher_mcp.models.certificates.RancherCertificateList
detail_response_model: rancher_mcp.models.certificates.RancherCertificateDetail

shared_imports:
  - certificate_summary_from_payload
  - data_items
support_value_imports:
  - string_dict
summary_function: certificate_summary_from_payload
query_builder_function: build_certificate_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, name, state, project_id, sort_by, reverse]
  filters: []
  count_field: certificate_count
  collection_field: certificates
  next_steps:
    - rancher_certificate_get
    - rancher_namespaced_certificates_list

get:
  arg_name: certificate_id
  summary_copy_fields: []
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_action_keys: true
  include_link_keys: true
  include_payload: false
  next_steps:
    - rancher_certificates_list
    - rancher_norman_resource_get

tools:
  list:
    name: rancher_certificates_list
    description: List Rancher project-scoped certificates via the Norman /v3 API. Returns curated summaries with cn, issuer, expiresAt, algorithm. Filter by name, state, or projectId.
    annotation_set: READ_ONLY
  get:
    name: rancher_certificate_get
    description: Fetch one Rancher certificate by id via the Norman /v3 API. Returns parsed cert metadata (sans, fingerprints, validity dates) without raw cert/key PEM. Use rancher_norman_resource_get with schema_id='certificate' for the unmasked payload.
    annotation_set: READ_ONLY
