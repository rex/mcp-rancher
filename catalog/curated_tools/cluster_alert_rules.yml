schema_version: 1

id: cluster_alert_rules
pack: alerts
display_name_singular: cluster_alert_rule
display_name_plural: cluster_alert_rules

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/clusteralertrules
