schema_version: 1

id: notifiers
pack: alerts
display_name_singular: notifier
display_name_plural: notifiers

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/notifiers
detail_path: /v3/notifiers/{notifier_id}

list_response_model: rancher_mcp.models.alerts.RancherNotifierList
detail_response_model: rancher_mcp.models.alerts.RancherNotifierDetail

shared_imports:
  - data_items
  - notifier_summary_from_payload
  - notifier_types
summary_function: notifier_summary_from_payload
query_builder_function: build_notifier_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, cluster_id, state]
  filters: []
  count_field: notifier_count
  collection_field: notifiers
  next_steps:
    - rancher_notifier_get
    - rancher_cluster_alert_rules_list

get:
  arg_name: notifier_id
  summary_copy_fields: []
  locals:
    - name: status
      expression: 'mapping_value(payload, "status") or {}'
  extras:
    - field: notifier_types
      expression: notifier_types(payload)
    - field: status
      expression: dict(status)
  include_action_keys: true
  include_link_keys: true
  include_payload: true
  next_steps:
    - rancher_notifiers_list
    - rancher_cluster_alert_rules_list

tools:
  list:
    name: rancher_notifiers_list
    description: List Rancher notifiers (Slack, email, PagerDuty, webhook, etc.) via the Norman /v3 API. Filter by cluster id or state.
    annotation_set: READ_ONLY
  get:
    name: rancher_notifier_get
    description: Fetch one Rancher notifier by id via the Norman /v3 API. Returns the curated summary, the configured notifier types, status, and action/link keys.
    annotation_set: READ_ONLY
