schema_version: 1

id: cluster_flows
pack: logging_pipeline
display_name_singular: cluster_flow
display_name_plural: cluster_flows

plane: steve
transport: k8s-proxy
namespaced: false

path_helper:
  module: rancher_mcp.tools.logging_pipeline.paths
  list_function: logging_cluster_collection_path
  detail_function: logging_cluster_resource_path
  resource_kind: clusterflows

list_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingClusterFlowList
detail_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingClusterFlowDetail

shared_imports:
  - cluster_flow_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: cluster_flow_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, patch]

list:
  query_params: [limit, continue_token, label_selector]
  filters: []
  count_field: cluster_flow_count
  collection_field: cluster_flows
  next_steps:
    - rancher_cluster_flow_get
    - rancher_cluster_outputs_list

get:
  arg_name: cluster_flow_name
  summary_copy_fields:
    - match_count
    - filter_count
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cluster_flows_list
    - rancher_cluster_outputs_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: cluster_flow_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_cluster_flow_get
      - rancher_cluster_outputs_list

tools:
  list:
    name: rancher_cluster_flows_list
    description: List Banzai logging ClusterFlow resources (cluster-scoped) via Rancher's raw Kubernetes proxy.
    annotation_set: READ_ONLY
  get:
    name: rancher_cluster_flow_get
    description: Fetch one Banzai logging ClusterFlow by name. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
  patches:
    - name: rancher_cluster_flow_set_labels
      description: Replace metadata.labels on one Banzai logging ClusterFlow via JSON merge-patch. The `labels` arg is a complete replacement map.
      annotation_set: IDEMPOTENT_WRITE
