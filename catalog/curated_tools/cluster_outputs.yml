schema_version: 1

id: cluster_outputs
pack: logging_pipeline
display_name_singular: cluster_output
display_name_plural: cluster_outputs

plane: steve
transport: k8s-proxy
namespaced: false

path_helper:
  module: rancher_mcp.tools.logging_pipeline.paths
  list_function: logging_cluster_collection_path
  detail_function: logging_cluster_resource_path
  resource_kind: clusteroutputs

list_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingClusterOutputList
detail_response_model: rancher_mcp.models.logging_pipeline.RancherLoggingClusterOutputDetail

shared_imports:
  - cluster_output_summary_from_payload
  - items
support_value_imports:
  - string_dict
summary_function: cluster_output_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, delete, patch]

delete:
  audit_operation: cluster_output_delete
  confirmation_phrase: "delete cluster_output {cluster_output_name}"
  next_steps:
    - rancher_cluster_outputs_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: cluster_output_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_cluster_output_get

  - verb: set_annotations
    target_path: metadata
    audit_operation: cluster_output_set_annotations
    args:
      - name: annotations
        type: dict_str_str
        required: true
        description: Replacement metadata.annotations map (merge-patch semantics — passing this REPLACES the annotations map; pass an empty dict to remove all annotations).
    next_steps:
      - rancher_cluster_output_get

list:
  query_params: [limit, continue_token, label_selector]
  filters:
    - name: output_type
      summary_field: output_type
  count_field: cluster_output_count
  collection_field: cluster_outputs
  next_steps:
    - rancher_cluster_output_get
    - rancher_cluster_flows_list

get:
  arg_name: cluster_output_name
  summary_copy_fields:
    - output_type
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: metadata_annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(metadata_annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cluster_outputs_list
    - rancher_cluster_flows_list

tools:
  list:
    name: rancher_cluster_outputs_list
    description: List Banzai logging ClusterOutput resources (cluster-scoped) via Rancher's raw Kubernetes proxy.
    annotation_set: READ_ONLY
  get:
    name: rancher_cluster_output_get
    description: Fetch one Banzai logging ClusterOutput by name. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
  delete:
    name: rancher_cluster_output_delete
    description: Delete one Banzai logging ClusterOutput (cluster-scoped). The `confirmation` arg must equal the exact phrase "delete cluster_output NAME" (substituting the actual name). Returns a typed delete result with the rendered confirmation phrase. Subject to write rate limiting and audit logging.
    annotation_set: DESTRUCTIVE
  patches:
    - name: rancher_cluster_output_set_labels
      description: Replace metadata.labels on one Banzai logging ClusterOutput (cluster-scoped) via JSON merge-patch. The `labels` arg is a complete replacement map.
      annotation_set: IDEMPOTENT_WRITE
    - name: rancher_cluster_output_set_annotations
      description: Replace metadata.annotations on one Banzai logging ClusterOutput (cluster-scoped) via JSON merge-patch. The `annotations` arg is a complete replacement map.
      annotation_set: IDEMPOTENT_WRITE
