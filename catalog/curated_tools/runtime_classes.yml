schema_version: 1

id: runtime_classes
pack: scheduling
display_name_singular: runtime_class
display_name_plural: runtime_classes

plane: steve
transport: k8s-proxy
namespaced: false

path_helper:
  module: rancher_mcp.tools.scheduling.paths
  list_function: node_v1_collection_path
  detail_function: node_v1_resource_path
  resource_kind: runtimeclasses

list_response_model: rancher_mcp.models.scheduling.RancherRuntimeClassList
detail_response_model: rancher_mcp.models.scheduling.RancherRuntimeClassDetail

shared_imports:
  - items
  - runtime_class_summary_from_payload
support_value_imports:
  - string_dict
summary_function: runtime_class_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, continue_token, label_selector]
  filters:
    - name: handler
      summary_field: handler
  count_field: runtime_class_count
  collection_field: runtime_classes
  next_steps:
    - rancher_runtime_class_get
    - rancher_pods_list

get:
  arg_name: runtime_class_name
  summary_copy_fields:
    - handler
    - overhead_pod_fixed_keys
    - scheduling_node_selector_keys
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_runtime_classes_list
    - rancher_pods_list

tools:
  list:
    name: rancher_runtime_classes_list
    description: List Kubernetes RuntimeClasses (node.k8s.io/v1, cluster-scoped) via Rancher's raw Kubernetes proxy. Returns curated summaries with handler (CRI runtime, e.g. 'kata' / 'gvisor'), overhead_pod_fixed_keys (resource names with overhead set), and scheduling_node_selector_keys. Filter by handler.
    annotation_set: READ_ONLY
  get:
    name: rancher_runtime_class_get
    description: Fetch one RuntimeClass by name. Returns the curated summary plus annotation keys and full payload.
    annotation_set: READ_ONLY
