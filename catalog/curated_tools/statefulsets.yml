schema_version: 1

id: statefulsets
pack: workloads
display_name_singular: statefulset
display_name_plural: statefulsets

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.workloads.paths
  list_function: workload_collection_path
  detail_function: workload_resource_path
  resource_kind: statefulsets

list_response_model: rancher_mcp.models.workloads.RancherStatefulSetList
detail_response_model: rancher_mcp.models.workloads.RancherStatefulSetDetail

shared_imports:
  - items
  - statefulset_summary_from_payload
support_value_imports:
  - string_dict
summary_function: statefulset_summary_from_payload

operations: [list, get, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: ready
      summary_field: ready
      type: bool
  count_field: statefulset_count
  collection_field: statefulsets
  next_steps:
    - rancher_statefulset_get
    - rancher_pods_list

get:
  arg_name: statefulset_name
  summary_copy_fields:
    - id
    - ready
    - container_images
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_statefulsets_list
    - rancher_pods_list

patch:
  verb: scale
  target_path: spec
  audit_operation: statefulset_scale
  args:
    - name: replicas
      type: int
      required: true
      description: Desired replica count for the StatefulSet.
  next_steps:
    - rancher_statefulset_get
    - rancher_pods_list

tools:
  list:
    name: rancher_statefulsets_list
    description: List statefulsets in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with readiness state.
    annotation_set: READ_ONLY
  get:
    name: rancher_statefulset_get
    description: Fetch one statefulset by namespace and name via Rancher's raw Kubernetes proxy. Returns the curated summary plus full payload and annotation keys.
    annotation_set: READ_ONLY
  patch:
    name: rancher_statefulset_scale
    description: Scale one Kubernetes StatefulSet to a target `replicas` count via JSON merge-patch on `spec.replicas`. Returns the curated detail of the patched resource. Subject to write rate limiting and audit logging.
    annotation_set: IDEMPOTENT_WRITE
