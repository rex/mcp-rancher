schema_version: 1

id: cis_scans
pack: compliance
display_name_singular: cis_scan
display_name_plural: cis_scans

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/cisscans
detail_path: /v3/cisscans/{scan_id}

list_response_model: rancher_mcp.models.compliance.RancherCisScanList
detail_response_model: rancher_mcp.models.compliance.RancherCisScanDetail

shared_imports:
  - cis_scan_summary_from_payload
  - data_items
summary_function: cis_scan_summary_from_payload
query_builder_function: build_cis_scan_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, cluster_id, state]
  filters: []
  count_field: scan_count
  collection_field: scans
  next_steps:
    - rancher_cis_scan_get
    - rancher_cis_scan_profiles_list

get:
  arg_name: scan_id
  summary_copy_fields: []
  locals:
    - name: status
      expression: 'mapping_value(payload, "status") or {}'
  extras:
    - field: status
      expression: dict(status)
  include_action_keys: false
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_cis_scans_list
    - rancher_cis_scan_profiles_list

tools:
  list:
    name: rancher_cis_scans_list
    description: List Rancher CIS scan runs via the Norman /v3 API. Filter by cluster id or state. Requires the CIS Benchmark app to be installed.
    annotation_set: READ_ONLY
  get:
    name: rancher_cis_scan_get
    description: Fetch one Rancher CIS scan run by id via the Norman /v3 API. Returns the curated summary plus status and full payload.
    annotation_set: READ_ONLY
