schema_version: 1

id: etcd_backups
pack: logging_backups
display_name_singular: etcd_backup
display_name_plural: etcd_backups

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/etcdbackups
detail_path: /v3/etcdbackups/{etcd_backup_id}

list_response_model: rancher_mcp.models.logging_backups.RancherEtcdBackupList
detail_response_model: rancher_mcp.models.logging_backups.RancherEtcdBackupDetail

shared_imports:
  - data_items
  - etcd_backup_summary_from_payload
  - link_keys
  - status_keys
summary_function: etcd_backup_summary_from_payload
query_builder_function: build_etcd_backup_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params:
    - limit
    - cluster_id
    - filename
    - manual
    - name
    - state
    - sort_by
    - reverse
  filters: []
  count_field: etcd_backup_count
  collection_field: etcd_backups
  next_steps:
    - rancher_etcd_backup_get
    - rancher_clusters_list

get:
  arg_name: etcd_backup_id
  summary_copy_fields: []
  locals: []
  extras:
    - field: backup_config
      expression: 'mapping_value(payload, "backupConfig") or {}'
    - field: status
      expression: 'mapping_value(payload, "status") or {}'
    - field: status_keys
      expression: status_keys(payload)
    - field: link_keys
      expression: link_keys(payload)
  include_action_keys: true
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_etcd_backups_list
    - rancher_clusters_list

tools:
  list:
    name: rancher_etcd_backups_list
    description: List Rancher etcd backups via the Norman /v3 API. Filter by cluster id, filename, manual, name, or state.
    annotation_set: READ_ONLY
  get:
    name: rancher_etcd_backup_get
    description: Fetch one Rancher etcd backup by id via the Norman /v3 API. Returns the curated summary plus backup config, status, and link keys.
    annotation_set: READ_ONLY
