  arg_name: group_id
  summary_copy_fields: []
  locals: []
  extras: []
  include_action_keys: false
  include_link_keys: true
  include_payload: true
  next_steps:
    - rancher_groups_list
    - rancher_users_list

tools:
  list:
    name: rancher_groups_list
    description: List Rancher groups via the Norman /v3 API. Filter by name or sort by any field.
    annotation_set: READ_ONLY
  get:
    name: rancher_group_get
    description: Fetch one Rancher group by id via the Norman /v3 API. Returns the curated summary plus link keys and the full payload.
    annotation_set: READ_ONLY
