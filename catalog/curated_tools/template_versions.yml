schema_version: 1

id: template_versions
pack: apps_catalogs
display_name_singular: template_version
display_name_plural: template_versions

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/templateversions
detail_path: /v3/templateversions/{template_version_id}

list_response_model: rancher_mcp.models.apps_catalogs.RancherTemplateVersionList
detail_response_model: rancher_mcp.models.apps_catalogs.RancherTemplateVersionDetail

shared_imports:
  - data_items
  - file_names_from_value
  - template_version_summary_from_payload
summary_function: template_version_summary_from_payload
query_builder_function: build_template_version_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, external_id, version, version_name, state, sort_by, reverse]
  filters: []
  count_field: template_version_count
  collection_field: template_versions
  next_steps:
    - rancher_template_version_get
    - rancher_templates_list

get:
  arg_name: template_version_id
  summary_copy_fields: []
  locals:
    - name: file_names
      expression: 'file_names_from_value(payload.get("files"))'
  extras:
    - field: file_names
      expression: file_names
    - field: file_count
      expression: len(file_names)
    - field: question_count
      expression: len(detail.questions)
  include_action_keys: false
  include_link_keys: true
  include_payload: true
  next_steps:
    - rancher_template_versions_list
    - rancher_templates_list

tools:
  list:
    name: rancher_template_versions_list
    description: List Rancher template versions via the Norman /v3 API. Filter by external id, version, or version name.
    annotation_set: READ_ONLY
  get:
    name: rancher_template_version_get
    description: Fetch one Rancher template version by id via the Norman /v3 API. Returns the curated summary, file names + count, question count, link keys, and full payload.
    annotation_set: READ_ONLY
