schema_version: 1

id: global_role_bindings
pack: rbac
display_name_singular: global_role_binding
display_name_plural: global_role_bindings

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/globalrolebindings
detail_path: /v3/globalrolebindings/{global_role_binding_id}

list_response_model: rancher_mcp.models.rbac.RancherGlobalRoleBindingList
detail_response_model: rancher_mcp.models.rbac.RancherGlobalRoleBindingDetail

shared_imports:
  - binding_subject
  - data_items
  - global_role_binding_summary_from_payload
  - link_keys
summary_function: global_role_binding_summary_from_payload
query_builder_function: build_global_role_binding_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, global_role_id, user_id, group_principal_id, name, sort_by, reverse]
  filters: []
  count_field: global_role_binding_count
  collection_field: global_role_bindings
  next_steps:
    - rancher_global_role_binding_get
    - rancher_global_roles_list

get:
  arg_name: global_role_binding_id
  summary_copy_fields: []
  locals:
    - name: subject
      expression: binding_subject(payload)
  extras:
    - field: subject_kind
      expression: subject[0]
    - field: subject_id
      expression: subject[1]
    - field: link_keys
      expression: link_keys(payload)
  include_action_keys: false
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_global_role_bindings_list
    - rancher_global_roles_list

tools:
  list:
    name: rancher_global_role_bindings_list
    description: List Rancher global role bindings via the Norman /v3 API. Filter by global role id, user id, or group principal id.
    annotation_set: READ_ONLY
  get:
    name: rancher_global_role_binding_get
    description: Fetch one Rancher global role binding by id via the Norman /v3 API. Returns the curated summary plus the derived subject (kind + id) and link keys.
    annotation_set: READ_ONLY
