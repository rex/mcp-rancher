schema_version: 1

id: settings
pack: settings_features
display_name_singular: setting
display_name_plural: settings

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/settings
detail_path: /v3/settings/{setting_id}

list_response_model: rancher_mcp.models.settings_features.RancherSettingList
detail_response_model: rancher_mcp.models.settings_features.RancherSettingDetail

shared_imports:
  - data_items
  - setting_summary_from_payload
summary_function: setting_summary_from_payload
query_builder_function: build_settings_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, source, customized, sort_by, reverse]
  filters: []
  count_field: setting_count
  collection_field: settings
  next_steps:
    - rancher_setting_get
    - rancher_features_list

get:
  arg_name: setting_id
  summary_copy_fields: []
  locals: []
  extras: []
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_settings_list
    - rancher_features_list

tools:
  list:
    name: rancher_settings_list
    description: List Rancher settings via the Norman /v3 API. Filter by source, customized state, or sort by any field.
    annotation_set: READ_ONLY
  get:
    name: rancher_setting_get
    description: Fetch one Rancher setting by id via the Norman /v3 API. Returns the curated summary plus full payload.
    annotation_set: READ_ONLY
