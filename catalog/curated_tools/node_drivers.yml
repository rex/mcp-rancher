schema_version: 1

id: node_drivers
pack: provisioning
display_name_singular: node_driver
display_name_plural: node_drivers

plane: norman
transport: norman
namespaced: false
cluster_id_required: false
pagination: false

list_path: /v3/nodedrivers
detail_path: /v3/nodedrivers/{driver_id}

list_response_model: rancher_mcp.models.provisioning.RancherNodeDriverList
detail_response_model: rancher_mcp.models.provisioning.RancherNodeDriverDetail

shared_imports:
  - data_items
  - node_driver_summary_from_payload
support_value_imports:
  - string_dict
summary_function: node_driver_summary_from_payload
query_builder_function: build_driver_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, active, name, state, sort_by, reverse]
  filters: []
  count_field: node_driver_count
  collection_field: node_drivers
  next_steps:
    - rancher_node_driver_get
    - rancher_node_templates_list

get:
  arg_name: driver_id
  summary_copy_fields: []
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_action_keys: true
  include_link_keys: true
  include_payload: true
  next_steps:
    - rancher_node_drivers_list
    - rancher_node_templates_list

tools:
  list:
    name: rancher_node_drivers_list
    description: List Rancher node drivers via the Norman /v3 API. Filter by name, state, or active flag.
    annotation_set: READ_ONLY
  get:
    name: rancher_node_driver_get
    description: Fetch one Rancher node driver by id via the Norman /v3 API. Returns the curated summary plus action/link keys, annotation keys, and full payload.
    annotation_set: READ_ONLY
