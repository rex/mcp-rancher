schema_version: 1

id: jobs
pack: batch_workloads
display_name_singular: job
display_name_plural: jobs

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.batch_workloads.paths
  list_function: batch_v1_collection_path
  detail_function: batch_v1_resource_path
  resource_kind: jobs

list_response_model: rancher_mcp.models.batch_workloads.RancherJobList
detail_response_model: rancher_mcp.models.batch_workloads.RancherJobDetail

shared_imports:
  - container_images_from_template
  - items
  - job_summary_from_payload
support_value_imports:
  - string_dict
summary_function: job_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters:
    - name: complete
      summary_field: complete
      type: bool
    - name: failed_terminal
      summary_field: failed_terminal
      type: bool
  count_field: job_count
  collection_field: jobs
  next_steps:
    - rancher_job_get
    - rancher_pods_list

get:
  arg_name: job_name
  summary_copy_fields:
    - complete
    - failed_terminal
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
    - field: container_images
      expression: container_images_from_template(payload)
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_jobs_list
    - rancher_pods_list

tools:
  list:
    name: rancher_jobs_list
    description: List Kubernetes Jobs (batch/v1) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with parallelism, completions, backoffLimit, active/succeeded/failed counts, start/completion times, and derived complete + failed_terminal booleans from status.conditions. Filter by complete or failed_terminal.
    annotation_set: READ_ONLY
  get:
    name: rancher_job_get
    description: Fetch one Kubernetes Job by namespace and name. Returns the curated summary plus container_images list (from spec.template.spec.containers), annotation keys, and full payload.
    annotation_set: READ_ONLY
