schema_version: 1

id: limit_ranges
pack: governance
display_name_singular: limit_range
display_name_plural: limit_ranges

plane: steve
transport: k8s-proxy
namespaced: true

path_helper:
  module: rancher_mcp.tools.governance.paths
  list_function: core_v1_collection_path
  detail_function: core_v1_resource_path
  resource_kind: limitranges

list_response_model: rancher_mcp.models.governance.RancherLimitRangeList
detail_response_model: rancher_mcp.models.governance.RancherLimitRangeDetail

shared_imports:
  - items
  - limit_range_summary_from_payload
support_value_imports:
  - string_dict
summary_function: limit_range_summary_from_payload
query_builder_function: build_list_query_params
query_builder_in_shared: true

operations: [list, get, patch]

list:
  query_params: [limit, continue_token, label_selector, field_selector]
  filters: []
  count_field: limit_range_count
  collection_field: limit_ranges
  next_steps:
    - rancher_limit_range_get
    - rancher_resource_quotas_list

get:
  arg_name: limit_range_name
  summary_copy_fields:
    - limit_count
    - types_present
  locals:
    - name: metadata
      expression: 'mapping_value(payload, "metadata") or {}'
    - name: annotations
      expression: 'mapping_value(metadata, "annotations") or {}'
  extras:
    - field: annotation_keys
      expression: sorted(string_dict(annotations))
  include_link_keys: false
  include_payload: true
  next_steps:
    - rancher_limit_ranges_list
    - rancher_resource_quotas_list

patches:
  - verb: set_labels
    target_path: metadata
    audit_operation: limit_range_set_labels
    args:
      - name: labels
        type: dict_str_str
        required: true
        description: Replacement metadata.labels map (merge-patch semantics — passing this REPLACES the labels map; pass an empty dict to remove all labels).
    next_steps:
      - rancher_limit_range_get
      - rancher_limit_ranges_list

tools:
  list:
    name: rancher_limit_ranges_list
    description: List Kubernetes LimitRanges (core/v1) in one namespace via Rancher's raw Kubernetes proxy. Returns curated summaries with limit_count and types_present (sorted unique 'type' strings from spec.limits, e.g. 'Container', 'Pod', 'PersistentVolumeClaim').
    annotation_set: READ_ONLY
  get:
    name: rancher_limit_range_get
    description: Fetch one LimitRange by namespace and name. Returns the curated summary plus annotation keys and full payload (with the spec.limits array intact).
    annotation_set: READ_ONLY
  patches:
    - name: rancher_limit_range_set_labels
      description: Replace metadata.labels on one Kubernetes LimitRange via JSON merge-patch. Returns the curated detail.
      annotation_set: IDEMPOTENT_WRITE
