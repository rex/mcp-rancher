# Pre-commit hooks — the independent enforcement backstop.
#
# Runs on `git commit`. The architecture + module-shape gates here
# mirror `make validate`, so a commit cannot bypass them even if `make
# validate` was skipped. This is the third enforcement layer, alongside
# the Makefile gates and the Stop hook.
#
#   One-time setup per clone:   pre-commit install
#   Refresh pinned versions:    pre-commit autoupdate
#
# The `rev:` pins below are real releases; run `pre-commit autoupdate`
# to move them forward. The repo-native gates under `local` have no
# pins that can go stale.
#
# NOTE: this repo uses a date-based CHANGELOG with no semver VERSION
# file, so the skeleton's `check-version-bumped` gate is intentionally
# not wired here (it requires a semver VERSION and would fail closed on
# every commit). Versioning is decoupled from per-commit enforcement.

# Generated lockfiles are tool-owned: exempt from secret-scanning, size
# caps, and whitespace rewriting (their hashes false-positive
# detect-secrets, and rewriting them corrupts tool state).
exclude: '(^|/)(uv\.lock|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|bun\.lockb?|Cargo\.lock|poetry\.lock|Gemfile\.lock|composer\.lock|Package\.resolved|Podfile\.lock|flake\.lock|go\.sum|gradle\.lockfile)$'

repos:
  # ── Hygiene + private-key detection (pure Python, no toolchain) ──────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-yaml
      - id: check-json
      - id: detect-private-key

  # ── Secret scanning — detect-secrets is pure Python, so pre-commit
  # installs it with no Go/Docker toolchain (unlike gitleaks).
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # Audited false-positive corpus (test fixtures: fake PEM/keys,
        # sanitized Rancher API captures, secret-NAMED sort-link fields).
        # New/unbaselined secrets still fail. Re-audit: detect-secrets scan
        # --baseline .secrets.baseline  (then `detect-secrets audit`).
        args: ['--baseline', '.secrets.baseline']

  # ── Shell-script linting — pip-packaged shellcheck, no system dep ───
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # ── Python lint + format (repo toolchain) ───────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Repo-native gates — mirror `make validate`; no remote pins ──────
  - repo: local
    hooks:
      - id: check-architecture
        name: architecture line limits (VIBE.yaml)
        entry: scripts/check_architecture.py
        language: script
        pass_filenames: false
        always_run: true
      - id: check-module-rules
        name: module shape — max public functions (VIBE.yaml)
        entry: scripts/check_module_rules.py
        language: script
        pass_filenames: false
        always_run: true
      - id: pyright
        name: pyright
        entry: uv run pyright src/
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
