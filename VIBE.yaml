kind: vibe-policy
schema_version: 1

project:
  name: rancher-mcp
  lifecycle: brownfield
  stack: python-fastmcp
  description: Capability-aware Rancher MCP server with comprehensive Rancher 2.6.5 coverage
  primary_target: kubernetes
  support_policy: maintained
  extensions:
    rancher_version: "2.6.5"
    rancher_support: "2.6.5 primary; later versions via capability detection"

stack:
  language: python
  python: "3.12"
  package_manager: uv
  framework: fastmcp
  validation: pydantic-v2
  settings: pydantic-settings
  http_client: httpx
  websocket_client: websockets
  logging: structlog
  retries: tenacity
  catalog_format: yaml

architecture:
  check_command: make check-architecture
  scope_globs:
    - src/**/*.py
    - src/**/*.ts
    - src/**/*.tsx
    - app/**/*.py
  exclude_globs:
    - "**/*.generated.*"
    - "**/node_modules/**"
    - "**/.next/**"
  max_lines_per_file:
    soft: 250
    hard: 400
  max_public_functions_per_module: 8
  prefer_packages_over_domain_files: true
  tool_module_rule: one-resource-or-one-operation-family-per-file
  mode: capability-aware
  multi_instance: required
  compatibility_strategy: adapters-and-detection
  tool_layers:
    - discovery-and-schema
    - generic-resource-and-action
    - curated-operator-workflows

quality_gates:
  lint:
    required: true
    command: make lint
  typecheck:
    required: true
    command: make typecheck
  tests:
    mode: required
    command: make test
    required_suites:
      - unit
    require_test_updates_for_all_code_changes: true
    coverage:
      enabled: true
      command: make test
      minimum_percentage: 60
      measurement: line
      enforcement_scope: overall
  clean_worktree_required_on_completion: true

testing:
  mode: enabled
  frameworks:
    - pytest
    - pytest-asyncio
    - pytest-cov
    - respx
  contract_fixtures: required

security:
  audit_logging: required
  secret_masking: required
  destructive_confirmation: required
  rate_limiting: required
  read_only_instance_mode: supported
  ssl_verification_default: true
  ssl_verification_override_env: RANCHER_VERIFY_SSL

distribution:
  transports:
    - stdio
  package_formats:
    - python-package
    - docker

workflow:
  changelog_required: true
  commit_per_logical_step: true
  signed_commits_required: true
  push_after_each_commit_if_remote_exists: true
  validation_command: make validate
  final_verification_command: make check-if-the-agent-can-consider-this-task-completed
  ask_before_dockerizing: true

reporting:
  completion_report:
    required: true
    heading: Completion Report
    format: markdown-table
    detail_level: compact
    version_command: null
    include_fields:
      - commit
      - git_status
      - version
      - final_verification
      - architecture
      - lint
      - typecheck
      - tests
      - coverage
      - waivers
    parse_counts_when_available: true
    include_not_applicable_fields: true
    omit_empty_fields: true
    include_raw_output_when: failures-or-dirty
    prefer_normalized_fields_over_raw_output: true

docs:
  agents_md_required: true
  claude_md_required: true
  task_state_required: true
  vibe_yaml_required: true

development:
  local_lab:
    required: true
    rancher_mode: helm-on-management-kind
    rancher_version: "2.6.5"
    management_kubernetes_version: "1.20.15"
    downstream_cluster: kind
    downstream_kubernetes_version: "1.23.17"
    downstream_runtime_note: "Simulated downstream cluster matches Kubernetes version but is not true RKE2"
    repo_local_kubeconfig: required
    repo_local_tool_cache: required

deployment:
  dockerized: false
  autodeploy:
    enabled: false
    system: null
    app_slug: null
    stack_required: false
    stack_repo_local_path: null
    stack_path: null
    runtime_changes_require_stack_update: false
    require_commit_push_deploy_after_stack_change: false

repo:
  canonical_plan: PERFECT_RANCHER_MCP_IMPLEMENTATION_PLAN.md
  capability_catalog: catalog/capabilities.yaml
  machine_policy: VIBE.yaml

decisions:
  package_manager:
    value: uv
    decided_by: Pierce
  testing_policy:
    value: enabled
    decided_by: Pierce
