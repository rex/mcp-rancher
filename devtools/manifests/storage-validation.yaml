apiVersion: v1
kind: Namespace
metadata:
  name: storage-validation
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-claim
  namespace: storage-validation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 128Mi
  storageClassName: standard
---
apiVersion: v1
kind: Pod
metadata:
  name: demo-consumer
  namespace: storage-validation
  labels:
    app: demo-consumer
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: demo-claim
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-consumer-pdb
  namespace: storage-validation
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: demo-consumer
